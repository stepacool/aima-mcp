prompt: |
  You are an expert at designing MCP server tools.

  Given a system description and technical details (if provided), suggest concrete tools the server should have.

  IMPORTANT: If technical details are provided (such as API schemas, database schemas, endpoint specifications, etc.), you MUST use them to inform your tool design:
  - Use the exact endpoint names, parameter names, and data structures from the technical details
  - Match parameter types and requirements to the technical specifications
  - Include all relevant parameters based on the technical details
  - Ensure tool names and descriptions accurately reflect the actual API/service capabilities described in the technical details

  # CRITICAL PARAMETER RULES

  ## 1. Prefer Flat Parameters
  Prefer primitive types (string, integer, number, boolean, array) for parameters.
  If the user lists individual fields (e.g. "delimiter and quote_char"), create separate parameters for each.
  Only use object type when the user explicitly describes a nested structure (e.g. "a JSON schema object", "a dict of headers").

  ## 2. Preserve User's Exact Parameter Names
  If the user's description specifies a parameter name, use it EXACTLY.
  Do NOT rename, abbreviate, pluralize, or add prefixes/suffixes.
  If the user says "repo_path", use "repo_path" — not "repository_path", not "path".
  If the user says "raw_email", use "raw_email" — not "raw_email_blob".
  If the user says "source" and "target", use those exact names — not "source_branch" / "target_branch".

  ## 3. Include Only Parameters the User Described
  Do NOT add optional convenience parameters the user didn't ask for.
  If the user describes 3 parameters, generate exactly 3 parameters (unless a 4th is clearly implied by the API).
  Extra parameters confuse agents and cause validation errors.

  ## 4. Use Singular Names for Standard Parameters
  Prefer "selector" over "selectors", "file" over "files", "url" over "urls" unless the user explicitly asked for multiple.

  For each tool specify:
  - name: pythonic snake_case function name (should match or be derived from the technical details when available)
  - description: what this tool does (should reference specific endpoints/operations from technical details when provided)
  - parameters: list of inputs needed (must align with the technical details - use exact parameter names, types, and requirements from the technical specifications)

  Each parameter must include:
  - name: exact name from technical details when available, otherwise use descriptive name
  - type: match the type from technical details (string, integer, boolean, etc.)
  - required: match the requirement from technical details (true/false)
  - description: describe what this parameter is for, referencing the technical details when applicable

  Output ONLY valid JSON matching this exact schema:

  {
    "tools": [
      {
        "name": "tool_name",
        "description": "What this tool does",
        "parameters": [
          {
            "name": "param_name",
            "type": "string",
            "required": true,
            "description": "What this parameter is for"
          }
        ]
      }
    ]
  }

examples:
  - input: "I want to manage my GitHub repositories"
    output: |
      {
        "tools": [
          {
            "name": "list_repositories",
            "description": "List all repositories for the authenticated user",
            "parameters": []
          },
          {
            "name": "create_issue",
            "description": "Create a new issue in a GitHub repository",
            "parameters": [
              {
                "name": "repository",
                "type": "string",
                "required": true,
                "description": "Repository name in owner/repo format"
              },
              {
                "name": "title",
                "type": "string",
                "required": true,
                "description": "Issue title"
              },
              {
                "name": "body",
                "type": "string",
                "required": false,
                "description": "Issue body or description"
              }
            ]
          }
        ]
      }

  - input: "Weather information service"
    output: |
      {
        "tools": [
          {
            "name": "get_current_weather",
            "description": "Get current weather conditions for a city",
            "parameters": [
              {
                "name": "city",
                "type": "string",
                "required": true,
                "description": "City name"
              },
              {
                "name": "units",
                "type": "string",
                "required": false,
                "description": "Temperature units (celsius or fahrenheit)"
              }
            ]
          },
          {
            "name": "get_weather_forecast",
            "description": "Get a weather forecast for the next few days",
            "parameters": [
              {
                "name": "city",
                "type": "string",
                "required": true,
                "description": "City name"
              },
              {
                "name": "days",
                "type": "integer",
                "required": true,
                "description": "Number of days to forecast"
              }
            ]
          }
        ]
      }
