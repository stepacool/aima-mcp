name: aima-mcp-backend
region: nyc
features:
  - buildpack-stack=ubuntu-22

services:
  - name: backend
    github:
      repo: stepacool/aima-mcp
      branch: main
      deploy_on_push: true
    source_dir: ./backend
    dockerfile_path: ./backend/Dockerfile
    http_port: 8000
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    envs:
      - key: POSTGRES_HOST
        scope: RUN_TIME
        value: ${backend-db.HOSTNAME}
      - key: POSTGRES_PORT
        scope: RUN_TIME
        value: ${backend-db.PORT}
      - key: POSTGRES_USER
        scope: RUN_TIME
        value: ${backend-db.USERNAME}
      - key: POSTGRES_PASSWORD
        scope: RUN_TIME
        value: ${backend-db.PASSWORD}
      - key: POSTGRES_DB
        scope: RUN_TIME
        value: ${backend-db.DATABASE}
      - key: PORT
        scope: RUN_TIME
        value: "8000"
      - key: DEBUG
        scope: RUN_TIME
        value: "false"
      - key: OAUTH_ISSUER
        scope: RUN_TIME
        value: "https://api.mcphero.app"
      - key: FRONTEND_URL
        scope: RUN_TIME
        value: "https://mcphero.app"
      - key: OPENROUTER_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: "secret"
      - key: OPENROUTER_BASE_URL
        scope: RUN_TIME
        value: "https://openrouter.ai/api/v1"
      - key: SERVER_DETAILS_GENERATION_MODEL
        scope: RUN_TIME
        value: "google/gemini-3.1-flash-lite-preview"
      - key: TOOL_GENERATION_MODEL
        scope: RUN_TIME
        value: "google/gemini-3.1-flash-lite-preview"
      - key: ENV_VARS_GENERATION_MODEL
        scope: RUN_TIME
        value: "google/gemini-3.1-flash-lite-preview"
      - key: CODE_GENERATION_MODEL
        scope: RUN_TIME
        value: "google/gemini-3.1-flash-lite-preview"
      - key: LOGFIRE_TOKEN
        scope: RUN_TIME
        value: ""

databases:
  - name: backend-db
    engine: PG
    version: "18"
    production: true
    cluster_name: mcphero-prod-db
    db_name: backend-db

domains:
  - domain: api.mcphero.app
    type: PRIMARY
